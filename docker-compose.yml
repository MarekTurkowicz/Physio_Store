name: fizjo-store

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  db:
    image: postgres:16-alpine
    container_name: physio_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: physioshop
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: physio_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: physio_mailhog
    restart: always
    ports:
      - "1025:1025"   # SMTP — used by Celery email tasks
      - "8025:8025"   # Web UI — view sent emails at http://localhost:8025
    logging:
      driver: none    # suppress MailHog's verbose output

  # ── Application ─────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./physio_shop
      dockerfile: Dockerfile
    container_name: physio_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/physioshop
      REDIS_URL: redis://redis:6379/0
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./physio_shop
      dockerfile: Dockerfile
    container_name: physio_celery_worker
    restart: always
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4 -E
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/physioshop
      REDIS_URL: redis://redis:6379/0
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: ./physio_shop
      dockerfile: Dockerfile
    container_name: physio_celery_beat
    restart: always
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/physioshop
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  flower:
    build:
      context: ./physio_shop
      dockerfile: Dockerfile
    container_name: physio_flower
    restart: always
    command: celery -A app.celery_app flower --port=5555
    ports:
      - "5555:5555"   # Flower dashboard at http://localhost:5555
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: physio_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
  redis_data:
