name: fizjo-store
version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: physio_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: physioshop
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./physio_shop
      dockerfile: Dockerfile
    container_name: physio_backend
    restart: always
    ports:
      - "8001:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/physioshop
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    container_name: physio_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
